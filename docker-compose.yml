services:
  backend:
    build:
      context: ./backend
    container_name: backend
    # ports:
    #   - "3000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
  db:
    build: 
      context: ./database
    container_name: postgres_db
    restart: always
    env_file:
      - ./backend/.env
    # ports:
    #   - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
  frontend:
    build:
      context: ./frontend
    container_name: frontend
    environment:
      - CHOKIDAR_USEPOLLING=true
    # ports:
    #   - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
  gateway:
    build: 
      context: ./gateway
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
